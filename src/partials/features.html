<section class="features-section section" id="features">
  <div class="features-bg-wrapper">
    <div class="container features-container">
      <h2 class="section-title features-title">Uniqueness</h2>
      <p class="features-subtitle">
        What makes Word Search Daily different? Well, it's:
      </p>
      <div class="features-swiper-container">
        <ul class="swiper-wrapper features-swiper-wrapper">
          <li class="swiper-slide features-slide">
            <picture>
              <source
                srcset="./img/features/features-img1-desk.png"
                media="(min-width: 1440px)"
                width="305"
                height="174" />
              <source
                srcset="./img/features/features-img1-mob.png"
                width="335"
                height="191" />
              <img
                class="features-img"
                src="./img/features/features-img1-mob.png"
                alt="Screenshot of the game"
                width="335"
                height="191"
                loading="lazy"
            /></picture>
            <p class="features-item-text">
              Fully optimized for smartwatch screens
            </p>
          </li>
          <li class="swiper-slide features-slide">
            <picture>
              <source
                srcset="./img/features/features-img2-desk.png"
                media="(min-width: 1440px)"
                width="305"
                height="174" />
              <source
                srcset="./img/features/features-img2-mob.png"
                width="335"
                height="191" />
              <img
                class="features-img"
                src="./img/features/features-img2-mob.png"
                alt="Screenshot of the game"
                width="335"
                height="191"
                loading="lazy"
            /></picture>
            <p class="features-item-text">Easy to play with one hand</p>
          </li>
          <li class="swiper-slide features-slide">
            <picture>
              <source
                srcset="./img/features/features-img3-desk.png"
                media="(min-width: 1440px)"
                width="305"
                height="174" />
              <source
                srcset="./img/features/features-img3-mob.png"
                width="335"
                height="191" />
              <img
                class="features-img"
                src="./img/features/features-img3-mob.png"
                alt="Screenshot of the game"
                width="335"
                height="191"
                loading="lazy"
            /></picture>
            <p class="features-item-text">Lightweight and fast to launc2</p>
          </li>
          <li class="swiper-slide features-slide">
            <picture>
              <source
                srcset="./img/features/features-img4-desk.png"
                media="(min-width: 1440px)"
                width="305"
                height="174" />
              <source
                srcset="./img/features/features-img4-mob.png"
                width="335"
                height="191" />
              <img
                class="features-img"
                src="./img/features/features-img4-mob.png"
                alt="Screenshot of the game"
                width="335"
                height="191"
                loading="lazy"
            /></picture>
            <p class="features-item-text">Ideal for short breaks</p>
          </li>
        </ul>
      </div>
      <div class="controls features-controls">
        <button
          class="arrow-btn"
          id="featuresLeftArrow"
          aria-label="Previous slide"
        >
          <svg class="arrow-icon" width="44" height="88">
            <use href="./img/sprite.svg#icon-arrow-left"></use>
          </svg>
        </button>
        <button
          class="arrow-btn"
          id="featuresRightArrow"
          aria-label="Next slide"
        >
          <svg class="arrow-icon" width="44" height="88">
            <use href="./img/sprite.svg#icon-arrow-right"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
